<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#31108f" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.35" />
    </filter>
  </defs>
  
  <!-- Outer glowing ring / background padding for maskable icons -->
  <rect width="512" height="512" rx="112" fill="#ffffff" />
  
  <!-- Crest Shield with shadow -->
  <g filter="url(#shadow)">
    <path d="M128,112 C128,112 256,80 256,80 C256,80 384,112 384,112 C384,112 396,280 376,340 C356,400 256,448 256,448 C256,448 156,400 136,340 C116,280 128,112 128,112 Z" fill="url(#shieldGrad)" />
  </g>
  
  <!-- Golden inner border -->
  <path d="M144,126 C144,126 256,98 256,98 C256,98 368,126 368,126 C368,126 378,272 360,324 C342,376 256,418 256,418 C256,418 170,376 152,324 C134,272 144,126 144,126 Z" fill="none" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round" />
  
  <!-- Open Book in bottom section -->
  <path d="M192,280 C210,270 236,270 256,285 C276,270 302,270 320,280 L320,335 C302,325 276,325 256,340 C236,325 210,325 192,335 Z" fill="#ffffff" />
  <path d="M256,285 L256,340" stroke="#4f46e5" stroke-width="2.5" />
  
  <!-- Glowing Star of Knowledge / Excellence -->
  <path d="M256,140 L268,168 L298,172 L276,194 L282,224 L256,208 L230,224 L236,194 L214,172 L244,168 Z" fill="url(#goldGrad)" />
  
  <!-- Graduating Cap / Mortarboard in center -->
  <path d="M190,210 L256,180 L322,210 L256,240 Z" fill="#ffffff" />
  <path d="M222,225 L222,255 C222,265 290,265 290,255 L290,225" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  <path d="M312,215 L312,250 C312,255 308,255 308,250" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" />
  <circle cx="312" cy="252" r="4" fill="url(#goldGrad)" />
</svg>
